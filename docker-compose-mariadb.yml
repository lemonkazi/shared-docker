version: "3.8"

services:
  php82_base:
    image: mamun/php82-fpm-node:1.0
    build:
      context: ./docker-base/php82-fpm-node
      dockerfile: Dockerfile
    container_name: php82_base_builder
    volumes:
      - ./docker/php/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
    profiles:
      - build_only # docker compose --profile build_only build
  php74_base:
    image: mamun/php74-fpm-node:1.0
    build:
      context: ./docker-base/php74-fpm-node
      dockerfile: Dockerfile
    container_name: php74_base_builder
    volumes:
      - ./docker/php/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
    profiles:
      - build_only
  node18_base:
    image: mamun/node18:1.0
    build:
      context: ./docker-base/node18
      dockerfile: Dockerfile
    container_name: node18_base_builder
    profiles:
      - build_only  # Only build this image when explicitly requested
  node25_base:
    image: mamun/node25:1.0
    build:
      context: ./docker-base/node25
      dockerfile: Dockerfile
    container_name: node25_base_builder
    profiles:
      - build_only  # Only build this image when explicitly requested

  shared_web:
    image: php:apache
    container_name: shared_web
    restart: always
    ports:
      - "5001:80"
    volumes:
      - ./public:/var/www/html
    networks:
      - shared_services

  shared_mysql:
    # image: mysql:8.0-oracle
    image: mariadb:10.11        # ← MariaDB LTS (MySQL 8 compatible)
    platform: linux/amd64       # MAC (change to linux/arm64/v8 for Apple Silicon)
    # image: mariadb:10.5
    # platform: linux/arm64/v8
    tty: true
    container_name: shared_mysql
    restart: always
    labels:
      project: "shared resource"
      environment: local
      company: "Kazi Mamun Inc"
    env_file:
      - ./docker/env/mysql.env
    volumes:
      # - shared_mysql_data:/var/lib/mysql
      - shared_mysql_data:/var/lib/mariadb   # ← MariaDB data dir
    
      - ./mariadbinit.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    networks:
      - shared_services
    # command: > # mysql
    #   --default-authentication-plugin=mysql_native_password
    #  --innodb-redo-log-capacity=0
    #   --character-set-server=utf8mb4
    #   --collation-server=utf8mb4_unicode_ci
    command: >
      --innodb-file-per-table=1
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --skip-name-resolve
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      # test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-plightwave86"] # mysql
      timeout: 20s
      retries: 10

  shared_phpmyadmin:
    image: phpmyadmin:latest
    container_name: shared_phpmyadmin
    restart: always
    ports:
      - "5010:80"
    env_file: ./docker/env/phpmyadmin.env
    environment:
      - PMA_ARBITRARY=0
      - PMA_SERVER_DEFAULT=1
    volumes:
      - ./config.user.inc.php:/etc/phpmyadmin/config.user.inc.php
      - ./php.ini:/usr/local/etc/php/php.ini
      - ./sessions:/var/lib/php/sessions
    depends_on:
      shared_mysql:
        condition: service_healthy
    networks:
      - shared_services


volumes:
  shared_mysql_data:

networks:
  shared_services:
    external: true
