version: "3.8"

services:
  php82_base:
    image: mamun/php82-fpm-node:1.0
    build:
      context: ./docker-base/php82-fpm-node
      dockerfile: Dockerfile
    container_name: php82_base_builder
    volumes:
      - ./docker/php/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
    profiles:
      - build_only

  php74_base:
    image: mamun/php74-fpm-node:1.0
    build:
      context: ./docker-base/php74-fpm-node
      dockerfile: Dockerfile
    container_name: php74_base_builder
    volumes:
      - ./docker/php/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
    profiles:
      - build_only

  node18_base:
    image: mamun/node18:1.0
    build:
      context: ./docker-base/node18
      dockerfile: Dockerfile
    container_name: node18_base_builder
    profiles:
      - build_only

  node25_base:
    image: mamun/node25:1.0
    build:
      context: ./docker-base/node25
      dockerfile: Dockerfile
    container_name: node25_base_builder
    profiles:
      - build_only

  shared_web:
    image: php:apache
    container_name: shared_web
    restart: always
    ports:
      - "5001:80"
    volumes:
      - ./public:/var/www/html
    networks:
      - shared_services

  # MySQL 8.0 Service
  shared_mysql:
    image: mysql:8.0-oracle
    container_name: shared_mysql
    restart: always
    labels:
      project: "shared resource"
      environment: local
      company: "Kazi Mamun Inc"
    env_file:
      - ./docker/env/mysql.env
    volumes:
      - shared_mysql_data:/var/lib/mysql
      - ./init_mysql.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    networks:
      - shared_services
    command: >
      --default-authentication-plugin=mysql_native_password
      --innodb-redo-log-capacity=0
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      timeout: 20s
      retries: 10

  # MariaDB Service (different container name for distinction)
  shared_mariadb:
    image: mariadb:10.11
    platform: linux/amd64
    container_name: shared_mariadb
    restart: always
    labels:
      project: "shared resource"
      environment: local
      company: "Kazi Mamun Inc"
    env_file:
      - ./docker/env/mariadb.env
    volumes:
      - shared_mariadb_data:/var/lib/mysql
      - ./init_mariadb.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3307:3306"  # Different host port to avoid conflict with MySQL
    networks:
      - shared_services
    command: >
      --innodb-file-per-table=1
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --skip-name-resolve
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      timeout: 20s
      retries: 10

  # PHPMyAdmin for both databases
  shared_phpmyadmin:
    image: phpmyadmin:latest
    container_name: shared_phpmyadmin
    restart: always
    ports:
      - "5010:80"
    env_file: ./docker/env/phpmyadmin.env
    environment:
      - PMA_ARBITRARY=1  # Allow connecting to any server
      - PMA_HOSTS=shared_mysql,shared_mariadb  # Multiple hosts
      - PMA_PORT=3306
    volumes:
      - ./config.user.inc.php:/etc/phpmyadmin/config.user.inc.php
      - ./php.ini:/usr/local/etc/php/php.ini
      - ./sessions:/var/lib/php/sessions
    depends_on:
      shared_mysql:
        condition: service_healthy
      shared_mariadb:
        condition: service_healthy
    networks:
      - shared_services

volumes:
  shared_mysql_data:
  shared_mariadb_data:

networks:
  shared_services:
    external: true